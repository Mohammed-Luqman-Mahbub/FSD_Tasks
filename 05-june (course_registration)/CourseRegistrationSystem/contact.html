</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://t4.ftcdn.net/jpg/01/82/62/43/360_F_182624315_Hjl749jl9WkEjRKo2vifWxqD4mSjxiV4.jpg" alt="Logo" class="me-2 rounded-circle">
                <span>Bridges Institute of Tutoring</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="registration.html">Login/Register</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Contact Us</h2>
                        <form>
                            <div class="mb-3 text-start">
                                <label for="contactName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="contactName" placeholder="Your full name" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="contactEmail" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactSubject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="contactSubject" placeholder="Subject" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactMessage" class="form-label">Message</label>
                                <textarea class="form-control" id="contactMessage" rows="5" placeholder="Write your message here" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-outline-primary">Send Message</button>
                            <button class="btn btn-outline-danger"><a href="index.html" class="text-danger" style="text-decoration: none;">Cancel</a></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
