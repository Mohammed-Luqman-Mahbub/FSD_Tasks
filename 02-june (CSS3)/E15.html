<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        header img {
            width: 100px;
            height: auto;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
        }
        nav{
            background-color: rgb(255, 92, 92);
            display: flex;
            flex-direction: row;
            padding: 10px;
            align-items: center;
            justify-content: center;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 7px;
        }
         nav a{
        text-decoration: none;
        padding: 10px;
        color: aliceblue;
        margin: auto;
    
        }
        nav a:hover{
            color: rgb(255, 255, 9);
            border-radius: 7px;
            background-color: rgb(122, 73, 73);
            text-decoration: underline;
            transform: scale(1.2);
            transition: all 0.15s ease;
            
        }
    </style>
</head>
<body>
    <header>
       <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQL66GKBkzRGnOEWCMsAuwSis2DIDxtw6Xtyw&s" alt="Welcome Image">

    </header>
    

    </header>

        <nav>

        </nav>

    </main>
    <footer>

    </footer>
</body>
</html>
