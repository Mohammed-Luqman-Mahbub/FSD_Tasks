<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Card</title>
    <style>
        .student-card {
            width: 100%;
            max-width: 600px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: auto;
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .student-card {
                flex-direction: column;
                text-align: center;
            }
            .student-info {
                width: 100%;
            }
            .student-info h2,
            .student-info p {
                margin: 0 0 8px;
            }
        }
        </style>
</head>
<body>
    <div class="student-card">
        <img src="dp.jpg" alt="Student Profile" class="profile-image">
        <div class="student-info">
            <h2>Sam Bridges</h2>
            <p><strong>Branch:</strong> Computer Science</p>
            <p><strong>Email:</strong> sam.bridges@student.com</p>
        </div>
    </div>
</body>
</html>
