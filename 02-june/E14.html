<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E14</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding: 210px;
            align-items: center;
        }
        .product-card {
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .product-card img:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            scale: 1.15;
            transition: all 0.3s ease;
        }
        .product-card button:hover {
            background-color: #4CAF50;
            color: white;
            transform: scale(1.2);
            border: 1px solid #000;
            border-radius: 5px;
            transition: all 0.3s ease;
            
        }
    </style>
</head>
<body>
    <div class="product-card">  
        <img src="https://wallpapercave.com/w/wp5170574.jpg" alt="Product Image" width="200" height="200">
        <h2>Wall Painting</h2>
        <p>500$</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
