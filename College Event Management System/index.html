    <h1 class="text-center m-5 text-uppercase" >College Event</h1>
<div id="carouselExampleCaptions" class="carousel slide m-5" data-bs-ride="carousel">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  
  <!-- Slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/coding-competition-design-template-87dba6fa6e8291b8fe5e29abc492288a_screen.jpg?ts=1676540509" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Coding competition registration details">
      <div class="carousel-caption d-none d-md-block">
        <h5>Coding Competition 2026</h5>
        <p>Register now to showcase your programming skills.</p>
      </div>
    </div>
    <div class="carousel-item">
        <img src="https://cdn.dribbble.com/userupload/42338355/file/original-a4aef702f1c4a336681b12026d69787e.jpg" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Coding competition poster">

      <div class="carousel-caption d-none d-md-block">
        <h5>Event Guidelines</h5>
        <p>Check out the rules and prize pool details here.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://apnaaddafest.in/blog/content/images/2025/03/LSR-Fest-DU.jpg" class="d-block w-100" style="height: 500px; object-fit: cover;" alt="LSR Fest cultural event banner">
      <div class="carousel-caption d-none d-md-block">
        <h5>LSR Fest Highlights</h5>
        <p>Experience the ultimate college cultural festival.</p>
      </div>
    </div>
  </div>
  
  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
