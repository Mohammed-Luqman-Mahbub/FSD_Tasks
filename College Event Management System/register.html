<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <div class="text-center">
        <h1> Event Management System</h1>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
<body class="align-content-center justify-content-center">    
    <nav class="navbar bg-dark-subtle m-2">
        <a class="nav-link " href="index.html"><i class="bi bi-house"></i>Home</a>
        <a class="nav-link" href="Events.html"><i class="bi bi-calendar2-event"></i>Events</a>
        <a class="nav-link" href="gallery.html"><i class="bi bi-file-earmark-image"></i>Gallery</a>
        <a class="nav-link" href="register.html"><i class="bi bi-box-arrow-in-right"></i>Registration</a>
        <a class="nav-link" href="contact.html"><i class="bi bi-person-rolodex"></i>Contact</a>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="fw-bold">Student Registration</h1>
                <p class="text-muted">Complete the form below to enroll in your chosen course.</p>
            </div>
            <div class="card shadow-sm form-card">
                <div class="card-body p-4">
                    <div id="successAlert" class="alert alert-success d-none" role="alert">
                        Registration submitted successfully! Thank you for registering with Bridges Institute.
                    </div>
                    <form id="registrationForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="studentName" class="form-label">Student Name</label>
                                <input type="text" class="form-control" id="studentName" placeholder="Enter your full name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                            </div>
                            <div class="col-md-6">
                                <label for="mobile" class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="mobile" placeholder="Enter your mobile number" required>
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-select" id="gender" required>
                                    <option value="" selected disabled>Select gender</option>
                                    <option>Female</option>
                                    <option>Male</option>
                                    <option>Non-binary</option>
                                    <option>Prefer not to say</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="courseSelection" class="form-label">Course Selection</label>
                                <select class="form-select" id="courseSelection" required>
                                    <option value="" selected disabled>Select a course</option>
                                    <option>Technical Quiz</option>
                                    <option>Hackathon</option>
                                    <option>Poster Presentation</option>
                                    <option>Coding Contest</option>
                                    <option>Project Expo</option>
                                    <option>Cultural Fest</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="qualification" class="form-label">Qualification</label>
                                <select class="form-select" id="qualification" required>
                                    <option value="" selected disabled>Select qualification</option>
                                    <option>High School</option>
                                    <option>Diploma</option>
                                    <option>Bachelor's Degree</option>
                                    <option>Master's Degree</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="address" class="form-label">Address</label>
                                <textarea class="form-control" id="address" rows="3" placeholder="Enter your address" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="resume" class="form-label">Upload Resume</label>
                                <input class="form-control" type="file" id="resume" required>
                            </div>
                            <div class="col-md-6 d-flex align-items-center">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" required>
                                    <label class="form-check-label" for="terms">
                                        I agree to the terms & conditions
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-secondary btn-lg">Submit Registration</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
