<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <div class="text-center">
        <h1> Event Management System</h1>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
<body class="align-content-center justify-content-center">    
    <nav class="navbar bg-dark-subtle m-2">
        <a class="nav-link " href="index.html"><i class="bi bi-house"></i>Home</a>
        <a class="nav-link" href="Events.html"><i class="bi bi-calendar2-event"></i>Events</a>
        <a class="nav-link" href="gallery.html"><i class="bi bi-file-earmark-image"></i>Gallery</a>
        <a class="nav-link" href="register.html"><i class="bi bi-box-arrow-in-right"></i>Registration</a>
        <a class="nav-link" href="contact.html"><i class="bi bi-person-rolodex"></i>Contact</a>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Contact Us</h2>
                        <form>
                            <div class="mb-3 text-start">
                                <label for="contactName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="contactName" placeholder="Your full name" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="contactEmail" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactSubject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="contactSubject" placeholder="Subject" required>
                            </div>
                            <div class="mb-3 text-start">
                                <label for="contactMessage" class="form-label">Message</label>
                                <textarea class="form-control" id="contactMessage" rows="5" placeholder="Write your message here" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-outline-primary">Send Message</button>
                            <button class="btn btn-outline-danger"><a href="index.html" class="text-danger" style="text-decoration: none;">Cancel</a></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
